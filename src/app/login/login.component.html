<ion-content [fullscreen]="true" [scrollY]="false">
  <div class="login-container">

    <div class="section-top">
      <div class="logo-section">
        <div class="logo-glow">
          <ion-img src="../../assets/subtrack_logo_full_inverse_transparent.png" alt="SubTrack Logo"></ion-img>
        </div>
      </div>
      <div class="title-section">
        <h1>Connexion</h1>
        <p>Content de te revoir sur SubTrack</p>
      </div>
    </div>

    <div class="section-middle">
      <form [formGroup]="loginForm" (ngSubmit)="loginWithEmail()">

        <div class="field-wrapper">
          <label class="field-label">Email</label>
          <ion-item>
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              type="email"
              placeholder="exemple@exemple.com"
              formControlName="email"
              [formControl]="email"
            ></ion-input>
          </ion-item>
          <ion-text color="danger" *ngIf="email.invalid && email.touched">
            Adresse email invalide.
          </ion-text>
        </div>

        <div class="field-wrapper">
          <label class="field-label">Mot de passe</label>
          <ion-item>
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              type="password"
              placeholder="••••••••"
              formControlName="password"
              [formControl]="password"
            >
              <ion-input-password-toggle slot="end"></ion-input-password-toggle>
            </ion-input>
          </ion-item>
          <ion-text color="danger" *ngIf="password.invalid && password.touched">
            Mot de passe invalide (6 caractères minimum).
          </ion-text>
        </div>

        <ion-text color="danger" *ngIf="!isDataValid && email.valid && password.valid">
          Email ou mot de passe incorrect.
        </ion-text>

        <ion-button expand="block" type="submit" class="submit-btn">
          Valider
        </ion-button>

        <div class="forgot-password" (click)="forgotPassword()">
          Mot de passe oublié ?
        </div>

      </form>
    </div>

    <div class="section-bottom">
      <div class="separator"><span>Ou</span></div>

      <ion-button expand="block" (click)="loginWithGoogle()" class="social-btn google-btn">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continuer avec Google
      </ion-button>

      <div class="signup-link">
        <span>Pas encore de compte ?</span>
        <span class="link" (click)="toSigninForm()">Créer un compte</span>
      </div>
    </div>

  </div>
</ion-content>
