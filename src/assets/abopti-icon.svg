<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=block');
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9333ea"/>
      <stop offset="48%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d22d9"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="58%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.50"/>
      <feDropShadow dx="0" dy="6"  stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.45"/>
    </filter>

    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="512" height="3" y="0" rx="0" fill="#ffffff" fill-opacity="0.30" clip-path="url(#clip)"/>
  <rect width="512" height="3" y="509" fill="#000000" fill-opacity="0.22" clip-path="url(#clip)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"/>

  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Outfit', sans-serif"
    font-weight="700"
    font-size="170"
    letter-spacing="-4"
    fill="#ffffff"
  >Abopti</text>
</svg>
